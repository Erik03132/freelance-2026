<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Trends 2026: What devs need to know</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --primary: #6366f1;
      --bg: #0f0f1a;
      --text: #f1f1f1;
      --accent: #22d3ee;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); }
    .deck { width: 100vw; height: 100vh; overflow: hidden; position: relative; }
    .slide { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 4rem; position: absolute; top: 0; left: 0; transition: opacity 0.4s, transform 0.4s; }
    .slide.active { opacity: 1; transform: translateX(0); }
    .slide.exit { opacity: 0; transform: translateX(-60px); }
    .slide.enter { opacity: 0; transform: translateX(60px); }
    .nav { position: fixed; bottom: 2rem; right: 2rem; display: flex; gap: 0.5rem; z-index: 100; }
    .nav button { background: var(--primary); color: white; border: none; padding: 0.5rem 1rem; border-radius: 0.5rem; cursor: pointer; font-size: 1rem; }
    .nav button:disabled { opacity: 0.3; }
    .slide-counter { position: fixed; bottom: 2rem; left: 2rem; font-size: 0.875rem; opacity: 0.6; z-index: 100; }
    h1 { font-size: 3rem; margin-bottom: 1rem; }
    h2 { font-size: 2rem; margin-bottom: 0.75rem; }
    p { font-size: 1.125rem; line-height: 1.6; max-width: 40rem; text-align: center; }
    .badge { display: inline-block; background: var(--accent); color: #000; padding: 0.25rem 0.75rem; border-radius: 999px; font-size: 0.75rem; font-weight: 600; margin-bottom: 1rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; width: 100%; max-width: 48rem; }
    .card { background: rgba(255,255,255,0.05); border-radius: 0.75rem; padding: 1.5rem; text-align: center; }
    .build { transition: all 0.5s ease; }
    .hidden { opacity: 0; transform: translateY(20px); }
    .visible { opacity: 1; transform: translateY(0); }
    .gradient-text { background: linear-gradient(90deg, var(--primary), var(--accent)); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .code-block { background: rgba(0,0,0,0.3); padding: 1rem; border-radius: 0.5rem; font-family: monospace; text-align: left; width: 100%; max-width: 40rem; }
    .timeline { position: relative; width: 100%; max-width: 40rem; }
    .timeline-item { position: relative; padding-left: 2rem; margin-bottom: 2rem; }
    .timeline-item:before { content: ''; position: absolute; left: 0; top: 0.25rem; width: 1rem; height: 1rem; border-radius: 50%; background: var(--accent); }
    .timeline-item:after { content: ''; position: absolute; left: 0.45rem; top: 1.25rem; width: 2px; height: calc(100% - 1rem); background: var(--primary); }
    .timeline-item:last-child:after { display: none; }
    @media (max-width: 640px) { h1 { font-size: 2rem; } .slide { padding: 2rem; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    /* ---- Slide components ---- */
    function Cover({ kicker, title, subtitle }) {
      return (
        <div className="slide" style={{textAlign: 'center'}}>
          {kicker && <span className="badge">{kicker}</span>}
          <h1 className="gradient-text">{title}</h1>
          {subtitle && <p style={{opacity: 0.7}}>{subtitle}</p>}
        </div>
      );
    }

    function Slide({ children, center, title }) {
      return (
        <div className="slide" style={center ? {textAlign: 'center'} : {alignItems: 'flex-start', paddingLeft: '6rem'}}>
          {title && <h2 style={{marginBottom: '2rem'}}>{title}</h2>}
          {children}
        </div>
      );
    }

    function Build({ children, at, step }) {
      return <div className={`build ${step >= at ? 'visible' : 'hidden'}`}>{children}</div>;
    }

    /* ---- Slides data ---- */
    const SLIDES = [
      {
        builds: 1,
        render: () => (
          <Cover 
            kicker="Future Forecast" 
            title="AI Trends 2026" 
            subtitle="What developers need to know to stay ahead" 
          />
        )
      },
      {
        builds: 3,
        render: (step) => (
          <Slide title="1. AI-Native Development">
            <Build at={0} step={step}>
              <p style={{marginBottom: '2rem'}}>By 2026, AI won't just be a tool - it will be the foundation of development workflows.</p>
            </Build>
            <Build at={1} step={step}>
              <div className="grid">
                <div className="card">
                  <h3>AI-First Frameworks</h3>
                  <p>New frameworks designed specifically for AI-generated and AI-assisted code</p>
                </div>
                <div className="card">
                  <h3>Self-Evolving Systems</h3>
                  <p>Applications that continuously improve their own code based on usage patterns</p>
                </div>
              </div>
            </Build>
            <Build at={2} step={step}>
              <div className="code-block" style={{marginTop: '2rem'}}>
                <p>// Example: AI-Native Component</p>
                <p>{"<AIGenerated>"}</p>
                <p>  {"<Intent>Create responsive navbar</Intent>"}</p>
                <p>  {"<Constraints>Mobile-first, WCAG AA</Constraints>"}</p>
                <p>{"</AIGenerated>"}</p>
              </div>
            </Build>
          </Slide>
        )
      },
      {
        builds: 3,
        render: (step) => (
          <Slide title="2. The Rise of Small AI">
            <Build at={0} step={step}>
              <p>The era of massive LLMs is giving way to specialized, efficient models.</p>
            </Build>
            <Build at={1} step={step}>
              <div className="timeline" style={{marginTop: '2rem'}}>
                <div className="timeline-item">
                  <h3>2023: Large Foundation Models</h3>
                  <p>GPT-4, Claude, etc. (100B+ parameters)</p>
                </div>
                <div className="timeline-item">
                  <h3>2025: Specialized Models</h3>
                  <p>Domain-specific models (1-10B parameters)</p>
                </div>
                <div className="timeline-item">
                  <h3>2026: Micro-AI Ecosystems</h3>
                  <p>Task-specific nano-models (<100M params) working in concert</p>
                </div>
              </div>
            </Build>
            <Build at={2} step={step}>
              <p style={{marginTop: '2rem'}}>Developers will need to orchestrate multiple specialized models rather than rely on single large models.</p>
            </Build>
          </Slide>
        )
      },
      {
        builds: 2,
        render: (step) => (
          <Slide title="3. Edge AI Becomes Standard">
            <Build at={0} step={step}>
              <p>AI processing will move to the edge, requiring new development approaches.</p>
            </Build>
            <Build at={1} step={step}>
              <div className="grid" style={{marginTop: '2rem'}}>
                <div className="card">
                  <h3>Client-Side AI</h3>
                  <p>Models running directly in browsers via WebGPU</p>
                </div>
                <div className="card">
                  <h3>Privacy-First</h3>
                  <p>Data never leaves the device</p>
                </div>
                <div className="card">
                  <h3>Offline Capabilities</h3>
                  <p>Full functionality without cloud dependency</p>
                </div>
              </div>
            </Build>
          </Slide>
        )
      },
      {
        builds: 3,
        render: (step) => (
          <Slide title="4. AI-Augmented Debugging">
            <Build at={0} step={step}>
              <p>Debugging will transform from error-fixing to AI collaboration.</p>
            </Build>
            <Build at={1} step={step}>
              <div style={{marginTop: '2rem', textAlign: 'left', width: '100%', maxWidth: '40rem'}}>
                <h3>Key Features:</h3>
                <ul style={{lineHeight: '1.8', marginTop: '1rem'}}>
                  <li>Predictive error detection before code runs</li>
                  <li>Automated root cause analysis with visual tracing</li>
                  <li>Context-aware solution generation</li>
                </ul>
              </div>
            </Build>
            <Build at={2} step={step}>
              <div className="code-block" style={{marginTop: '2rem'}}>
                <p>// 2026 Debugging Workflow</p>
                <p>1. AI detects potential race condition</p>
                <p>2. Visualizes data flow across components</p>
                <p>3. Suggests three optimized solutions</p>
                <p>4. Implements chosen solution with tests</p>
              </div>
            </Build>
          </Slide>
        )
      },
      {
        builds: 2,
        render: (step) => (
          <Slide title="5. The New Testing Paradigm">
            <Build at={0} step={step}>
              <p>Testing will evolve to handle AI's probabilistic nature.</p>
            </Build>
            <Build at={1} step={step}>
              <div className="grid" style={{marginTop: '2rem'}}>
                <div className="card">
                  <h3>Probabilistic Assertions</h3>
                  <p>Testing for ranges rather than exact matches</p>
                </div>
                <div className="card">
                  <h3>AI-Generated Tests</h3>
                  <p>Automated test case generation based on usage</p>
                </div>
                <div className="card">
                  <h3>Behavioral Testing</h3>
                  <p>Validating outcomes rather than implementations</p>
                </div>
              </div>
            </Build>
          </Slide>
        )
      },
      {
        builds: 2,
        render: (step) => (
          <Slide center title="Get Ready for 2026">
            <Build at={0} step={step}>
              <h2 className="gradient-text" style={{marginBottom: '2rem'}}>Key Takeaways</h2>
            </Build>
            <Build at={1} step={step}>
              <div style={{textAlign: 'center'}}>
                <p style={{marginBottom: '1.5rem'}}>1. Adopt AI-native development patterns</p>
                <p style={{marginBottom: '1.5rem'}}>2. Prepare for specialized small AI ecosystems</p>
                <p style={{marginBottom: '1.5rem'}}>3. Embrace edge computing capabilities</p>
                <p style={{marginBottom: '1.5rem'}}>4. Master AI-augmented debugging tools</p>
                <p>5. Rethink testing for probabilistic systems</p>
              </div>
            </Build>
          </Slide>
        )
      }
    ];

    /* ---- App ---- */
    function App() {
      const [current, setCurrent] = useState(0);
      const [step, setStep] = useState(0);
      const slides = SLIDES;
      const slide = slides[current];
      const totalBuilds = slide?.builds ?? 1;

      const next = useCallback(() => {
        if (step + 1 < totalBuilds) {
          setStep(s => s + 1);
        } else if (current + 1 < slides.length) {
          setCurrent(c => c + 1);
          setStep(0);
        }
      }, [current, step, totalBuilds, slides.length]);

      const prev = useCallback(() => {
        if (step > 0) {
          setStep(s => s - 1);
        } else if (current > 0) {
          setCurrent(c => c - 1);
          const prevSlide = slides[current - 1];
          setStep(prevSlide?.builds ? prevSlide.builds - 1 : 0);
        }
      }, [current, step, slides]);

      useEffect(() => {
        const handler = (e) => { 
          if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'ArrowDown') { 
            e.preventDefault(); 
            next(); 
          } 
          if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { 
            e.preventDefault(); 
            prev(); 
          } 
        };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, [next, prev]);

      return (
        <div className="deck">
          <div className="slide-counter">{current + 1} / {slides.length}</div>
          <div className="slides-container">
            {slides.map((s, i) => (
              <div key={i} className={`slide ${i === current ? 'active' : ''}`} style={{display: i === current ? 'flex' : 'none'}}>
                {s.render(step)}
              </div>
            ))}
          </div>
          <div className="nav">
            <button onClick={prev} disabled={current === 0 && step === 0}>←</button>
            <button onClick={next} disabled={current === slides.length - 1 && step >= totalBuilds - 1}>→</button>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
