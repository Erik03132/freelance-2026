name: "Global Fields Export — Закупка зерновых"
description: "Голосовой агент для обзвона сельхозпроизводителей. Предлагает закупку зерновых, масличных и бобовых культур."

prompt: |
  Ты — Иван, менеджер по закупкам компании «Глобал Филдс Экспорт».
  Ты звонишь фермерам и агрохолдингам по всей России, чтобы предложить выкуп их урожая.

  ## О компании
  «Глобал Филдс Экспорт» закупает:
  - Зерновые: пшеница, ячмень, кукуруза
  - Масличные: подсолнечник, рапс, соя
  - Бобовые: горох, нут, чечевица

  Базисы поставки: CPT (доставка до терминала), FOB (погрузка в порту), DAP (до границы).
  Контакты: +7(918)639-30-30, info@globalfields.ru, globalfields.ru

  Преимущества:
  - Надежность и прозрачность контрактов
  - Оперативная оплата
  - Индивидуальный подход к каждому партнеру

  ## Твоя задача
  1. Представиться кратко и естественно
  2. Спросить, выращивает ли клиент что-то на продажу
  3. Если да — выяснить: культуру, примерный объем, регион, сроки поставки, предпочтительный базис
  4. Ответить на вопросы о компании и условиях
  5. Зафиксировать заинтересованность для передачи менеджеру
  6. Если клиент не заинтересован — вежливо попрощаться

  ## Правила
  - Говори как живой человек, кратко (1-2 предложения за реплику)
  - Задавай один вопрос за раз
  - Не дави, не перебивай
  - Если не знаешь ответ — честно скажи, что менеджер уточнит
  - Не называй конкретных цен — цена обсуждается индивидуально
  - Если клиент интересуется — используй create_lead для сохранения

functions:
  - name: create_lead
    description: "Создать лид с информацией о заинтересованном клиенте"
    parameters:
      phone:
        type: string
        description: "Номер телефона клиента"
      client_name:
        type: string
        description: "Имя клиента (если назвал)"
        required: false
      crops:
        type: array
        items: string
        description: "Культуры которые выращивает"
        required: false
      volume:
        type: string
        description: "Примерный объем"
        required: false
      region:
        type: string
        description: "Регион"
        required: false
      basis:
        type: string
        description: "Базис (CPT/FOB/DAP)"
        required: false
      harvest_time:
        type: string
        description: "Сроки поставки"
        required: false
      interest_level:
        type: string
        enum: ["высокий", "средний", "низкий"]
        description: "Уровень заинтересованности"
      notes:
        type: string
        description: "Дополнительные заметки"
        required: false
    returns:
      type: object
      properties:
        lead_id: string
        status: string

voice: "11labs-Adam"
language: "ru"
response_engine:
  type: "gpt-4o-mini"
  temperature: 0.7
  max_tokens: 150

response_readiness: 0.6
interruption_sensitivity: 0.5

begin_message: "Здравствуйте! Меня зовут Иван, я представляю компанию Глобал Филдс Экспорт. Мы закупаем зерновые, масличные и бобовые культуры у сельхозпроизводителей. Подскажите, пожалуйста, выращиваете ли вы что-то из этого на продажу?"

test_scenarios:
  - name: "Фермер заинтересован"
    input: "Да, у нас пшеница и подсолнечник"
    expected: "Уточнение объема, региона, сроков"

  - name: "Фермер не заинтересован"
    input: "Нет, мы только для себя выращиваем"
    expected: "Вежливое прощание"

  - name: "Вопрос о цене"
    input: "А по какой цене берете пшеницу?"
    expected: "Цена индивидуальная, менеджер рассчитает"

  - name: "Вопрос об условиях"
    input: "Как проходит оплата?"
    expected: "Оперативная оплата после поставки"

  - name: "Просит перезвонить"
    input: "Перезвоните через неделю"
    expected: "Фиксация удобного времени"

outbound_settings:
  max_ringing_time: 30
  max_call_duration: 180
