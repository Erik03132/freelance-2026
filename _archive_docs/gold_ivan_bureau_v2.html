<!DOCTYPE html>
<html lang='ru'>
<head>
<meta charset='UTF-8'>
<style>
  body { 
    margin: 0; padding: 0; 
    width: 1920px; height: 226px; 
    background: #000;
    display: flex; flex-direction: column; 
    justify-content: center; align-items: center; 
    color: #FFD700; /* Gold */
    font-family: 'Georgia', serif;
    overflow: hidden;
    position: relative;
    border: 1px solid #222;
  }
  .bg-glow {
    position: absolute;
    width: 100%; height: 100%;
    background: radial-gradient(circle at center, rgba(255,215,0,0.15) 0%, transparent 70%);
    pointer-events: none;
  }
  .neural-decor {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    opacity: 0.3;
    background-image: 
      radial-gradient(#FFD700 1px, transparent 1px),
      linear-gradient(to right, rgba(255,215,0,0.05) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,215,0,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .container {
    z-index: 10;
    text-align: center;
  }
  h1 { 
    font-size: 55px; text-transform: uppercase; margin: 0; letter-spacing: 12px; 
    font-weight: 900;
    text-shadow: 0 0 20px rgba(255,215,0,0.5), 0 5px 15px rgba(0,0,0,0.8);
    background: linear-gradient(135deg, #FFD700 0%, #FFFACD 50%, #B8860B 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  p { 
    font-size: 16px; margin: 12px 0 0 0; text-transform: uppercase; letter-spacing: 6px;
    color: #DAA520; /* Goldenrod */
    font-weight: 300;
    opacity: 0.8;
  }
</style>
</head>
<body>
  <div class='bg-glow'></div>
  <div class='neural-decor'></div>
  <div class='container'>
    <h1>IVAN BUREAU</h1>
    <p>DIGITAL PRODUCT ARCHITECT | AI SOLUTIONS</p>
  </div>
</body>
</html>
