<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI BUREAU | Архитектура Интеллекта</title>
    <meta name="description" content="AI BUREAU — Первое агентство по внедрению ИИ-агентов и автоматизации бизнеса мирового уровня." />
    
    <!-- Schema.org JSON-LD for Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "AI Bureau",
      "url": "https://ai-bureau.pro",
      "logo": "https://ai-bureau.pro/logo.png",
      "description": "Специализированное инженерное бюро по проектированию автономных интеллектуальных систем и RAG-инфраструктур.",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "RU"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "email": "architect@ai-bureau.pro"
      }
    }
    </script>

    <!-- Schema.org JSON-LD for Service (General Example) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Service",
      "serviceType": "AI Automation and Agent Development",
      "provider": {
        "@type": "Organization",
        "name": "AI Bureau"
      },
      "areaServed": "Worldwide",
      "description": "Разработка автономных AI-агентов, RAG-систем и внедрение локальных LLM."
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
